version: 2

project_name: ouractl

before:
  hooks:
    - go mod tidy

env:
  - GO111MODULE=on

report_sizes: true

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/hagelstam/ouractl/internal/version.Version={{.Version}}

archives:
  - id: binaries
    formats: [binary]
    name_template: 'ouractl_{{ .Tag }}_{{ .Os }}-{{ .Arch }}'
  - id: tarballs
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: '{{ incpatch .Version }}-next'

release:
  header: |
    # {{ .Version }}

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^test:'
      - '^chore'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: "^.*\\(deps\\)*:+.*$"
      order: 300
    - title: 'New features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: 'Bug fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: 'Documentation updates'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: Other work
      order: 9999

brews:
  - ids:
      - tarballs
    name: ouractl
    commit_author:
      name: hagelstam
      email: maximilian.hagelstam@gmail.com
    commit_msg_template: 'Brew formula update for {{ .ProjectName }} version {{ .Tag }}'
    directory: Formula
    homepage: 'https://github.com/hagelstam/ouractl'
    description: 'A command line tool for your Oura Ring data'
    license: 'MIT'
    install: |
      bin.install "ouractl"
    test: |
      system "#{bin}/ouractl", "--version"
    repository:
      owner: hagelstam
      name: homebrew-tap
      branch: main
      token: '{{ .Env.GITHUB_TOKEN }}'
